# ==========================================
# Configuração do Banco de Dados PostgreSQL
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/spotify_orm
spring.datasource.username=postgres
spring.datasource.password=112359aA@
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# Configuração do Hibernate / JPA
# ==========================================

# create-drop: recria o schema a cada inicialização (útil para desenvolvimento)
# validate: apenas valida o schema (produção)
# update: atualiza o schema automaticamente
spring.jpa.hibernate.ddl-auto=create-drop

# Dialeto do PostgreSQL para o Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Mostra o SQL gerado no console (ótimo para entender o que o ORM faz)
spring.jpa.show-sql=true

# Formata o SQL para melhor legibilidade
spring.jpa.properties.hibernate.format_sql=true

# Geração de estatísticas (útil para detectar problema N+1)
spring.jpa.properties.hibernate.generate_statistics=false

# ==========================================
# Configuração do servidor
# ==========================================
server.port=8080
spring.application.name=spotify-orm

# Inicializar dados ao subir a aplicação
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
